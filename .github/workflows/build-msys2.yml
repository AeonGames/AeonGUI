name: Build on Windows (MSYS2)

on: [push, pull_request]

jobs:

  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        sys: [mingw64, ucrt64, clang64]
        backend: [Cairo, Skia]
        include:
          - { sys: mingw64, icon: '🟦' }
          - { sys: ucrt64,  icon: '🟨' }
          - { sys: clang64, icon: '🟧' }
    name: 🚧${{ matrix.icon }} ${{ matrix.sys }} (${{ matrix.backend }})
    defaults:
      run:
        shell: msys2 {0}
    steps:

    - name: '🧰 Checkout'
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: '🔎 Detect compiled-file changes'
      id: changes
      uses: dorny/paths-filter@v3
      with:
        filters: |
          compiled:
            - 'CMakeLists.txt'
            - 'cmake/**'
            - 'vcpkg.json'
            - 'vcpkg-configuration.json'
            - 'core/**'
            - 'include/**'
            - 'tests/**'
            - 'demos/**'
            - 'css/**'
            - '**/*.c'
            - '**/*.cc'
            - '**/*.cpp'
            - '**/*.cxx'
            - '**/*.h'
            - '**/*.hpp'
            - '**/*.cu'

    - name: '${{ matrix.icon }} Setup MSYS2'
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{matrix.sys}}
        update: true
        install: >-
          git
          make
          flex
          bison
        pacboy: >-
          toolchain:p
          cmake:p
          make:p
          tools-git:p
          ${{ matrix.backend == 'Skia' && 'skia:p' || 'cairo:p' }}
          pango:p
          libxml2:p
          gtest:p
          pkg-config:p
          zlib:p
          libpng:p
          libjpeg-turbo:p
          vulkan-devel:p
          vulkan-loader:p
          glslang:p
          astyle:p
          doxygen:p
          graphviz:p
      if: steps.changes.outputs.compiled == 'true'

    - name: '🛠️ Configuring'
      run: cmake -G "MSYS Makefiles" -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release -DAEONGUI_BACKEND=${{ matrix.backend }}
      if: steps.changes.outputs.compiled == 'true'

    - name: '🏗️ Building'
      run: cmake --build ${{github.workspace}}/build
      if: steps.changes.outputs.compiled == 'true'

    - name: '🧪 Running Tests'
      run: ctest --test-dir ${{github.workspace}}/build --output-on-failure
      if: steps.changes.outputs.compiled == 'true' && matrix.backend != 'Skia'

    - name: '✅ Skip build (no compiled changes)'
      if: steps.changes.outputs.compiled != 'true'
      shell: bash
      run: echo "No compiled-relevant files changed. Skipping build and tests."
