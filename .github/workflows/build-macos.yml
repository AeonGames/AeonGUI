name: Build on macOS

on: [push, pull_request]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: macos-latest

    strategy:
      matrix:
        compiler: [clang]
        backend: [Cairo, Skia]

    steps:
    - name: '🧰 Checkout'
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: '🔎 Detect compiled-file changes'
      id: changes
      uses: dorny/paths-filter@v4
      with:
        filters: |
          compiled:
            - 'CMakeLists.txt'
            - 'cmake/**'
            - 'tools/homebrew/**'
            - 'homebrew-ports/**'
            - 'vcpkg.json'
            - 'vcpkg-configuration.json'
            - 'core/**'
            - 'include/**'
            - 'tests/**'
            - 'demos/**'
            - 'css/**'
            - '**/*.c'
            - '**/*.cc'
            - '**/*.cpp'
            - '**/*.cxx'
            - '**/*.h'
            - '**/*.hpp'
            - '**/*.cu'

    - name: '📦 Install dependencies'
      run: |
        brew update
        brew install cmake pkg-config cairo pango libxml2 googletest gsed bison zlib libpng libjpeg-turbo
        if [ "${{ matrix.backend }}" = "Skia" ]; then
          brew tap aeongames/ports
          brew install --build-from-source aeongames/ports/skia-aeongui
        fi
      if: matrix.compiler == 'clang' && steps.changes.outputs.compiled == 'true'

    - name: '🌋 Install Vulkan SDK'
      uses: jakoch/install-vulkan-sdk-action@v1.4.0
      with:
        vulkan_version: latest
        install_runtime: true
        cache: true
      if: steps.changes.outputs.compiled == 'true'

    - name: '🛠️ Configuring (${{ matrix.backend }})'
      run: |
        export PATH="/opt/homebrew/opt/bison/bin:$PATH"
        if [ "${{ matrix.backend }}" = "Skia" ]; then
          export SKIA_ROOT="$(brew --prefix skia-aeongui)"
          export PKG_CONFIG_PATH="$SKIA_ROOT/lib/pkgconfig:/opt/homebrew/lib/pkgconfig:$PKG_CONFIG_PATH"
          cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DAEONGUI_BACKEND=Skia -DAEONGUI_SKIA_ROOT="$SKIA_ROOT" -DENABLE_HTML=ON
        else
          export PKG_CONFIG_PATH="/opt/homebrew/lib/pkgconfig:$PKG_CONFIG_PATH"
          cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DAEONGUI_BACKEND=Cairo -DENABLE_HTML=ON
        fi
      if: matrix.compiler == 'clang' && steps.changes.outputs.compiled == 'true'

    - name: '🏗️ Building'
      run: cmake --build ${{github.workspace}}/build
      if: steps.changes.outputs.compiled == 'true'

    - name: '🧪 Running Tests'
      run: ctest --test-dir ${{github.workspace}}/build
      if: steps.changes.outputs.compiled == 'true'

    - name: '✅ Skip build (no compiled changes)'
      if: steps.changes.outputs.compiled != 'true'
      run: echo "No compiled-relevant files changed. Skipping build and tests."