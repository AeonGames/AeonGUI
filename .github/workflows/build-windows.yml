name: Build on Windows

on: [push, pull_request]

env:
  USERNAME: AeonGames
  VCPKG_EXE: C:\vcpkg\vcpkg.exe
  FEED_URL: https://nuget.pkg.github.com/AeonGames/index.json
  VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/AeonGames/index.json,readwrite;nugettimeout,900"
  VCPKG_FEATURE_FLAGS: "binarycaching,manifests,versions"
  VCPKG_VERBOSE: "1"

jobs:
  build:
    name: '${{ matrix.compiler }} (${{ matrix.backend }})'
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write
      actions: read

    strategy:
      matrix:
        compiler: [msvc]
        backend: [Cairo, Skia]

    steps:
    - name: '🧰 Checkout'
      uses: actions/checkout@v6

    - name: '🔎 Detect compiled-file changes'
      id: changes
      uses: dorny/paths-filter@v4
      with:
        filters: |
          compiled:
            - 'CMakeLists.txt'
            - 'cmake/**'
            - 'vcpkg.json'
            - 'vcpkg-configuration.json'
            - 'core/**'
            - 'include/**'
            - 'tests/**'
            - 'demos/**'
            - 'css/**'
            - '**/*.c'
            - '**/*.cc'
            - '**/*.cpp'
            - '**/*.cxx'
            - '**/*.h'
            - '**/*.hpp'
            - '**/*.cu'

    - name: '🔁 Check previous run for this job'
      id: last
      uses: actions/github-script@v7
      env:
        JOB_NAME: '${{ matrix.compiler }} (${{ matrix.backend }})'
      with:
        script: |
          // Re-run when the most recent run of THIS exact job (matrix
          // combination) on this branch failed, so a non-compiled-file
          // fix (e.g. workflow tweak) can recover CI.  Successful jobs
          // are not retried.  Skipped on pull_request events.
          if (context.eventName !== 'push') {
            core.setOutput('force', 'false');
            return;
          }
          const jobName = process.env.JOB_NAME;
          const branch = context.ref.replace('refs/heads/', '');
          const runs = await github.paginate(
            github.rest.actions.listWorkflowRunsForRepo,
            {
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch,
              status: 'completed',
              per_page: 50,
            }
          );
          const priorRuns = runs
            .filter(r => r.name === context.workflow && r.id !== context.runId)
            .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
          let force = 'false';
          for (const run of priorRuns) {
            const jobs = await github.paginate(
              github.rest.actions.listJobsForWorkflowRun,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
                per_page: 100,
              }
            );
            const matched = jobs.find(j => j.name === jobName);
            if (matched) {
              core.info(
                `Last "${jobName}" (run ${run.id}) conclusion: ${matched.conclusion}`
              );
              if (matched.conclusion !== 'success') force = 'true';
              break;
            }
          }
          core.setOutput('force', force);

    - name: '✅ Skip build (no compiled changes)'
      if: steps.changes.outputs.compiled != 'true' && steps.last.outputs.force != 'true'
      run: echo "No compiled-relevant files changed and previous run succeeded. Skipping build and tests."

    - name: 🔄 Update Visual Studio
      shell: pwsh
      run: |
        & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe" update --installPath "${env:ProgramFiles}\Microsoft Visual Studio\2022\Enterprise" --quiet --wait
      if: matrix.compiler == 'msvc' && (steps.changes.outputs.compiled == 'true' || steps.last.outputs.force == 'true')

    - name: ⬆️ Update VCPKG
      shell: pwsh
      run: |
        cd C:\vcpkg
        git pull
        .\bootstrap-vcpkg.bat
        # mkdir C:\vcpkg\downloads
        # curl -o C:\vcpkg\downloads\GNOME-pango-1.56.1.tar.gz "https://gitlab.gnome.org//GNOME/pango/-/archive/1.56.1/pango-1.56.1.tar.gz"
      if: matrix.compiler == 'msvc' && (steps.changes.outputs.compiled == 'true' || steps.last.outputs.force == 'true')

    - name: 📦 Add NuGet sources
      shell: pwsh
      run: |
        .$(${{ env.VCPKG_EXE }} fetch nuget) `
          sources add `
          -Source "${{ env.FEED_URL }}" `
          -StorePasswordInClearText `
          -Name GitHubPackages `
          -UserName "${{ env.USERNAME }}" `
          -Password "${{ secrets.PAT }}"
        .$(${{ env.VCPKG_EXE }} fetch nuget) `
          setapikey "${{ secrets.PAT }}" `
          -Source "${{ env.FEED_URL }}"
      if: matrix.compiler == 'msvc' && (steps.changes.outputs.compiled == 'true' || steps.last.outputs.force == 'true')

    - name: '🛠️ Configuring'
      run: |
        cmake -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" -DAEONGUI_BACKEND=${{ matrix.backend }} -DENABLE_HTML=ON -B ${{github.workspace}}/build
      if: steps.changes.outputs.compiled == 'true' || steps.last.outputs.force == 'true'

    - name: '🏗️ Building'
      run: cmake --build ${{github.workspace}}/build
      if: steps.changes.outputs.compiled == 'true' || steps.last.outputs.force == 'true'

    - name: '🧪 Running Tests'
      run: ctest --output-on-failure --verbose -C Debug --test-dir ${{github.workspace}}/build
      if: steps.changes.outputs.compiled == 'true' || steps.last.outputs.force == 'true'


