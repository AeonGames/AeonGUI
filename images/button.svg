<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6cf"/>
      <stop offset="100%" stop-color="#39f"/>
    </linearGradient>
    <linearGradient id="btnGradHover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8df"/>
      <stop offset="100%" stop-color="#5bf"/>
    </linearGradient>
    <linearGradient id="btnGradActive" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#28e"/>
      <stop offset="100%" stop-color="#17c"/>
    </linearGradient>
    <linearGradient id="btnGradGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6e6"/>
      <stop offset="100%" stop-color="#3b3"/>
    </linearGradient>
    <linearGradient id="btnGradGreenHover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8f8"/>
      <stop offset="100%" stop-color="#5d5"/>
    </linearGradient>
    <linearGradient id="btnGradGreenActive" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2"/>
      <stop offset="100%" stop-color="#191"/>
    </linearGradient>
    <linearGradient id="btnGradRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f66"/>
      <stop offset="100%" stop-color="#d33"/>
    </linearGradient>
    <linearGradient id="btnGradRedHover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f88"/>
      <stop offset="100%" stop-color="#e55"/>
    </linearGradient>
    <linearGradient id="btnGradRedActive" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b22"/>
      <stop offset="100%" stop-color="#911"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <filter id="shadowPressed">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-opacity="0.2"/>
    </filter>
  </defs>

  <script href="button.js"/>
  <script type="native" href="button"/>

  <rect width="800" height="600" fill="#f0f0f0"/>
  <text x="400" y="50" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#333">SVG Button Mouse Events</text>

  <!-- Status display -->
  <rect x="200" y="480" width="400" height="80" rx="8" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text id="status" x="400" y="530" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#555">Hover or click a button</text>

  <!-- Blue Button -->
  <g id="blueBtn" cursor="pointer" filter="url(#shadow)"
     onmouseover="btnMouseOver(this, 'url(#btnGradHover)', 'Blue Button')"
     onmouseout="btnMouseOut(this, 'url(#btnGrad)', 'Blue Button')"
     onmousedown="btnMouseDown(this, 'url(#btnGradActive)', 'Blue Button')"
     onmouseup="btnMouseUp(this, 'url(#btnGradHover)', 'Blue Button')">
    <rect x="100" y="100" width="200" height="60" rx="10" fill="url(#btnGrad)" stroke="#29e" stroke-width="2"/>
    <text x="200" y="138" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#fff" pointer-events="none">Blue Button</text>
  </g>

  <!-- Green Button -->
  <g id="greenBtn" cursor="pointer" filter="url(#shadow)"
     onmouseover="btnMouseOver(this, 'url(#btnGradGreenHover)', 'Green Button')"
     onmouseout="btnMouseOut(this, 'url(#btnGradGreen)', 'Green Button')"
     onmousedown="btnMouseDown(this, 'url(#btnGradGreenActive)', 'Green Button')"
     onmouseup="btnMouseUp(this, 'url(#btnGradGreenHover)', 'Green Button')">
    <rect x="500" y="100" width="200" height="60" rx="10" fill="url(#btnGradGreen)" stroke="#2a2" stroke-width="2"/>
    <text x="600" y="138" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#fff" pointer-events="none">Green Button</text>
  </g>

  <!-- Red Button -->
  <g id="redBtn" cursor="pointer" filter="url(#shadow)"
     onmouseover="btnMouseOver(this, 'url(#btnGradRedHover)', 'Red Button')"
     onmouseout="btnMouseOut(this, 'url(#btnGradRed)', 'Red Button')"
     onmousedown="btnMouseDown(this, 'url(#btnGradRedActive)', 'Red Button')"
     onmouseup="btnMouseUp(this, 'url(#btnGradRedHover)', 'Red Button')">
    <rect x="300" y="250" width="200" height="60" rx="10" fill="url(#btnGradRed)" stroke="#b22" stroke-width="2"/>
    <text x="400" y="288" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#fff" pointer-events="none">Red Button</text>
  </g>

  <!-- Toggle Button -->
  <g id="toggleBtn" cursor="pointer" filter="url(#shadow)"
     onmousedown="toggleMouseDown(this)">
    <rect x="300" y="380" width="200" height="60" rx="30" fill="#888" stroke="#666" stroke-width="2"/>
    <text x="400" y="418" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#fff" pointer-events="none">OFF</text>
  </g>
</svg>
